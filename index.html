<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MüzikLab</title>

<style>
body{
    margin:0;
    background:#1b1b1b;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:340px;
    background:#2b2b2b;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

h1{
    color:#00d084;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#00d084;
    color:white;
}

button:hover{
    background:#00b56f;
}
</style>

</head>

<body>

<div class="box">

<h1>🎵 MüzikLab</h1>

<p>Kulak Eğitimi Sistemi</p>

<button>👨‍🏫 Öğretmen</button>

<button>🎓 Öğrenci</button>

</div>

</body>
</html>
